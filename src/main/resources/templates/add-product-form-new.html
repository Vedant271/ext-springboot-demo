<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Add Product</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

	<div class="container mt-5">
		<h2 class="mb-4 text-center">Add New Product</h2>

		<form th:action="@{/addUpdateProduct}" th:object="${productDTO}" method="post" class="card p-4 shadow-sm mb-5" enctype="multipart/form-data">
			<input type="hidden" th:field="*{id}">
			<div class="mb-3">
				<label for="title" class="form-label">Product Title</label>
				
				<input type="text" th:field="*{title}" class="form-control" id="title" placeholder="Enter title"
					required>
				<div class="mb-3">
					<label class="form-label">Product Image</label>
					<input type="file" name="imageFile" class="form-control" accept="image/*">
				</div>
				<div class="mb-3">
					<label for="desc" class="form-label">Description</label>
					<textarea th:field="*{description}" class="form-control" id="desc" rows="3"
						placeholder="Enter description" required></textarea>
				</div>
				<div class="mb-3">
					<label for="category" class="form-label">Category</label>
					<input type="text" th:field="*{category}" class="form-control" id="category"
						placeholder="Enter category" required>
				</div>
				<div class="mb-3">
					<label for="price" class="form-label">Price (₹)</label>
					<input type="number" th:field="*{price}" class="form-control" id="price" placeholder="Enter price"
						min="0" step="0.01" required>
				</div>
				<div class="mb-3">
					<label for="rating" class="form-label">Rating</label>
					<input type="number" th:field="*{rating.rate}" class="form-control" id="rating"
						placeholder="Enter rating" min="0" step="0.01" required>
				</div>
				<div class="mb-3">
					<label for="count" class="form-label">Rating Count</label>
					<input type="number" th:field="*{rating.count}" class="form-control" id="count"
						placeholder="Enter rating count" min="0" step="0.01" required>
				</div>
				<div class="d-flex gap-2 justify-content-end">
					<button type="submit" class="btn btn-success"
						th:text="${productDTO.id == 0 ? 'Save Product' : 'Update Product'}"></button>
					<a th:href="@{/allProducts}" class="btn btn-secondary">Back to List</a>
				</div>
		</form>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
