<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Add User</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
	<div class="container mt-5">
		<h2 class="mb-4 text-center">Register New User</h2>

		<form th:action="@{/saveUserFE}" th:object="${user}" method="post" class="card p-4 shadow-sm">
			<div class="mb-3">
				<label for="username" class="form-label">User name</label>
				<input type="text" th:field="*{userName}" class="form-control" id="username" placeholder="Enter name">
			</div>
			<div class="mb-3">
				<label for="password" class="form-label">Password</label>
				<input type="text" th:field="*{userPassword}" class="form-control" id="password"
					placeholder="Enter Password" required>
			</div>
			<div class="mb-3">
				<label class="form-label"> Select Roles </label>
				<div th:each="role : ${roles}" class="form-check">
					<input class="form-check-input" type="checkbox" th:field="*{roles}" th:value="${role.roleId}" />
					<label class="form-check-label" th:text="${role.roleName}"> </label>
				</div>
			</div>
			<div class="d-flex gap-2 justify-content-end">
				<button type="submit" class="btn btn-success">Save User</button>
				<a th:href="@{/allProducts}" class="btn btn-secondary">Back to List</a>
			</div>
		</form>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
