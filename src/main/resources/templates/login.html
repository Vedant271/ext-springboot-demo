<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Login</title>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: Arial, Helvetica, sans-serif;
		}

		body {
			height: 100vh;
			background: #f5f7fa;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		.login-card {
			width: 360px;
			background: white;
			padding: 35px;
			border-radius: 10px;
			box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
		}

		h2 {
			text-align: center;
			margin-bottom: 25px;
			color: #333;
		}

		input {
			width: 100%;
			padding: 12px;
			margin-bottom: 15px;
			border: 1px solid #ccc;
			border-radius: 6px;
			font-size: 15px;
		}

		button {
			width: 100%;
			padding: 12px;
			border: none;
			background: #4CAF50;
			color: white;
			border-radius: 6px;
			font-size: 16px;
			cursor: pointer;
		}

		button:hover {
			background: #388E3C;
		}

		.divider {
			text-align: center;
			margin: 20px 0;
			color: gray;
			font-size: 14px;
		}

		.google-container {
			display: flex;
			justify-content: center;
		}

		.google-btn {
			display: inline-flex;
			text-decoration: none;
		}

		.google-icon {
			width: 42px;
			height: 42px;
			border-radius: 50%;
			background: #c0c0c0;
			color: #fff;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 22px;
			font-weight: bold;
			cursor: pointer;
			transition: .25s;
		}

		.google-icon:hover {
			background: #B22234;
		}
	</style>
</head>

<body>

	<div class="login-card">

		<h2>Login</h2>

		<form th:action="@{/login}" method="post">

			<input type="text" name="username" placeholder="Username" required>

			<input type="password" name="password" placeholder="Password" required>

			<button type="submit">Login</button>

		</form>

		<div class="divider">or you can sign in with</div>

		<div class="google-container">
			<a href="/oauth2/authorization/google" class="google-btn">
				<span class="google-icon">G</span>
			</a>
		</div>

	</div>

</body>

</html>
