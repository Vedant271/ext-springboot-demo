<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Login</title>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: Arial, Helvetica, sans-serif;
		}

		body {
			height: 100vh;
			background: #f5f7fa;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		.login-card {
			width: 360px;
			background: white;
			padding: 35px;
			border-radius: 10px;
			box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
		}

		h2 {
			text-align: center;
			margin-bottom: 25px;
			color: #333;
		}

		input {
			width: 100%;
			padding: 12px;
			margin-bottom: 15px;
			border: 1px solid #ccc;
			border-radius: 6px;
			font-size: 15px;
		}

		button {
			width: 100%;
			padding: 12px;
			border: none;
			background: #1976d2;
			color: white;
			border-radius: 6px;
			font-size: 16px;
			cursor: pointer;
		}

		button:hover {
			background: #1565c0;
		}

		.divider {
			text-align: center;
			margin: 20px 0;
			color: gray;
			font-size: 14px;
		}

		.google-btn {
			display: block;
			text-align: center;
			text-decoration: none;
			background: #db4437;
			color: white;
			padding: 12px;
			border-radius: 6px;
			font-weight: bold;
		}

		.google-btn:hover {
			background: #c1351d;
		}
	</style>
</head>

<body>

	<div class="login-card">

		<h2>Login</h2>

		<form th:action="@{/login}" method="post">

			<input type="text" name="username" placeholder="Username" required>

			<input type="password" name="password" placeholder="Password" required>

			<button type="submit">Login</button>

		</form>

		<div class="divider">OR</div>

		<a href="/oauth2/authorization/google" class="google-btn">
			Login with Google
		</a>

	</div>

</body>

</html>
